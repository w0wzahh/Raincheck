<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff"/>
      <stop offset="50%" style="stop-color:#0984e3"/>
      <stop offset="100%" style="stop-color:#0652DD"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff"/>
      <stop offset="100%" style="stop-color:#0984e3"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#roundRect)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <circle cx="180" cy="160" r="200" fill="rgba(255,255,255,0.06)"/>
  </g>
  
  <g clip-path="url(#roundRect)">
    <!-- Cloud -->
    <g filter="url(#shadow)">
      <path d="M400 240H130c-44.2 0-80-35.8-80-80s35.8-80 80-80c3.5 0 7 .2 10.4.7C153.6 46.4 193 20 238 20c55.2 0 100 44.8 100 100 0 3.2-.2 6.3-.4 9.4C366 139 390 169 390 204c0 19.9-16.1 36-36 36h46z"
            fill="url(#cloud)" opacity="0.95"/>
    </g>
    
    <!-- Rain drops -->
    <g opacity="0.9">
      <path d="M155 300c0 16-14 30-14 30s-14-14-14-30a14 14 0 0128 0z" fill="url(#drop)"/>
      <path d="M225 300c0 16-14 30-14 30s-14-14-14-30a14 14 0 0128 0z" fill="url(#drop)"/>
      <path d="M295 300c0 16-14 30-14 30s-14-14-14-30a14 14 0 0128 0z" fill="url(#drop)"/>
      <path d="M365 300c0 16-14 30-14 30s-14-14-14-30a14 14 0 0128 0z" fill="url(#drop)"/>
      <path d="M190 370c0 16-14 30-14 30s-14-14-14-30a14 14 0 0128 0z" fill="url(#drop)" opacity="0.65"/>
      <path d="M260 370c0 16-14 30-14 30s-14-14-14-30a14 14 0 0128 0z" fill="url(#drop)" opacity="0.65"/>
      <path d="M330 370c0 16-14 30-14 30s-14-14-14-30a14 14 0 0128 0z" fill="url(#drop)" opacity="0.65"/>
      <path d="M225 440c0 16-14 30-14 30s-14-14-14-30a14 14 0 0128 0z" fill="url(#drop)" opacity="0.4"/>
      <path d="M295 440c0 16-14 30-14 30s-14-14-14-30a14 14 0 0128 0z" fill="url(#drop)" opacity="0.4"/>
    </g>
  </g>
</svg>
